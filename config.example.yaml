# vpaste 配置文件
# 复制到 ~/.config/vpaste/config.yaml 并填入你的配置

secret_id: "your_cos_secret_id"
secret_key: "your_cos_secret_key"
# token: ""  # 可选，临时凭证时使用

bucket: "your-bucket-name-1234567890"
region: "ap-shanghai"
cdn_domain: "cdn.your-domain.com"
upload_path: "vpaste/temp"

# 临时文件自动清理配置
# temp_retention_hours: 24  # 文件保留时间（小时），默认24小时，超过此时间的文件会被清理